<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM LOGIN // ADMIN</title>
    <link rel="stylesheet" href="css/login.css" />
</head>
<body>

    <div class="login-box">
        <h2>$ sudo login</h2>
        <div id="error-msg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username_</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password_</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-login">[ AUTHENTICATE ]</button>
            <a href="/" class="btn-return">[ <_ ABORT_LOGIN ]</a>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
