<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT // IDENTITY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">sys_admin/</div>
        <a href="dashboard.html"><i class="fas fa-terminal"></i> Status</a>
        <a href="profiles.html" class="active"><i class="fas fa-user-secret"></i> Identity</a>
        <a href="skills.html"><i class="fas fa-code"></i> Skills</a>
        <a href="experience.html"><i class="fas fa-network-wired"></i> Logs</a>
        <a href="projects.html"><i class="fas fa-folder-open"></i> Projects</a>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h2>> _ Core Identity Override</h2>
            <button onclick="handleLogout()" class="logout-btn">[ LOGOUT ]</button>
        </div>
        
        <div class="content-area">
            <div class="profile-card">
                <form id="profileForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nama Lengkap_</label>
                            <input type="text" id="nama_lengkap" placeholder="e.g. Budiono Siregar">
                        </div>
                        <div class="form-group">
                            <label>Nama Panggilan_</label>
                            <input type="text" id="nama_panggilan" placeholder="e.g. Budiono">
                        </div>
                        <div class="form-group">
                            <label>Email Utama_</label>
                            <input type="email" id="email" placeholder="e.g. budiono.siregar@example.com">
                        </div>
                        <div class="form-group">
                            <label>Telepon_</label>
                            <input type="text" id="telepon" placeholder="e.g. 081234567890">
                        </div>
                        <div class="form-group">
                            <label>Tempat Lahir_</label>
                            <input type="text" id="tempat_lahir" placeholder="e.g. Salatiga">
                        </div>
                        <div class="form-group">
                            <label>Tanggal Lahir_</label>
                            <input type="date" id="tanggal_lahir" style="color: #888;">
                        </div>
                        <div class="form-group">
                            <label>Universitas_</label>
                            <input type="text" id="universitas" placeholder="e.g. Universitas Kristen Satya Wacana">
                        </div>
                        <div class="form-group">
                            <label>Fakultas_</label>
                            <input type="text" id="fakultas" placeholder="e.g. Fakultas Teknologi Informasi">
                        </div>
                        <div class="form-group">
                            <label>Prodi_</label>
                            <input type="text" id="prodi" placeholder="e.g. S1 Sistem Informasi">
                        </div>
                        <div class="form-group">
                            <label>Semester_</label>
                            <input type="text" id="semester" placeholder="e.g. 6">
                        </div>
                        <div class="form-group full">
                            <label>Alamat / Domisili_</label>
                            <input type="text" id="alamat" placeholder="e.g. Jl. Raya Diponegoro No. 12, Salatiga, Jawa Tengah">
                        </div>
                        <div class="form-group full">
                            <!-- Nyimpen URL asli dari Cloudinary secara sembunyi-sembunyi -->
                            <input type="hidden" id="foto_url"> 
                            
                            <label>Upload Foto Profil (Opsional)_</label>
                            
                            <!-- Input file yang asli disembunyikan -->
                            <input type="file" id="foto_file" accept="image/*" style="display: none;">
                            
                            <!-- Custom UI -->
                            <div style="display: flex; align-items: center; gap: 15px; border: 1px dashed #FF5500; padding: 15px;">
                                <label for="foto_file" class="btn-neon" style="margin: 0; padding: 5px 15px; white-space: nowrap; flex-shrink: 0;">
                                    [ CHOOSE FILE ]
                                </label>
                                <span id="file-name-display" style="color: #888; font-family: inherit;">> Awaiting file_</span>
                            </div>
                            
                            <div id="upload-status">> UPLOADING TO CLOUD_ SERVER...</div>
                            <small style="color: #888; display: block; margin-top: 5px;">> CAUTION: Biarkan kosong jika tidak ingin mengubah foto profil saat ini.</small>
                        </div>
                    </div>
                    <button type="submit" class="btn-neon" id="saveBtn">[ UPLOAD DATA ]</button>
                    <div id="status-msg">> DATA OVERRIDDEN SUCCESSFULLY.</div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/profiles.js"></script> 
</body>
</html>
