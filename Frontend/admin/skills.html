<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT // SKILLS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">sys_admin/</div>
        <a href="dashboard.html"><i class="fas fa-terminal"></i> Status</a>
        <a href="profiles.html"><i class="fas fa-user-secret"></i> Identity</a>
        <a href="skills.html" class="active"><i class="fas fa-code"></i> Skills</a>
        <a href="experience.html"><i class="fas fa-network-wired"></i> Logs</a>
        <a href="projects.html"><i class="fas fa-folder-open"></i> Projects</a>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h2>> _ Skills Configuration</h2>
            <div>
                <button onclick="handleLogout()" class="logout-btn">[ LOGOUT ]</button>
            </div>
        </div>
        
        <div class="content-area">
            <div class="header-action">
                <p style="color: #888;">Configure your technical capabilities.</p>
                <button class="btn-neon" onclick="openModal()">[+ ADD SKILL ]</button>
            </div>
            
            <table class="cyber-table">
                <thead>
                    <tr>
                        <th style="width: 10%;">ID</th>
                        <th style="width: 15%;">Icon</th>
                        <th style="width: 45%;">Skill Name</th>
                        <th style="width: 30%;">Action</th>
                    </tr>
                </thead>
                <tbody id="skills-tbody">
                    <tr><td colspan="4" style="text-align: center;">Fetching data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Form Tambah/Edit Skill -->
    <div class="modal" id="skillModal">
        <div class="modal-content">
            <h3 id="modalTitle">> _ Add New Skill</h3>
            <form id="skillForm">
                <input type="hidden" id="skillId">
                <div class="form-group">
                    <label>Skill Name_</label>
                    <input type="text" id="nama_skill" placeholder="e.g. Python" required>
                </div>
                <div class="form-group">
                    <label>Icon Class (FontAwesome)_</label>
                    <input type="text" id="icon_class" placeholder="e.g. fab fa-python" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-neon btn-danger" onclick="closeModal()">[ CANCEL ]</button>
                    <button type="submit" class="btn-neon" id="saveBtn">[ EXECUTE ]</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="modal-confirm" id="sysConfirmModal">
        <div class="confirm-box">
            <h3>> _ SYSTEM WARNING</h3>
            <p id="sysConfirmMsg">Are you sure you want to execute this action?</p>
            <div class="confirm-actions">
                <button class="btn-neon-safe" id="sysConfirmCancel">[ ABORT ]</button>
                <button class="btn-neon-danger" id="sysConfirmOk">[ DESTROY ]</button>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/skills.js"></script> 
</body>
</html>
